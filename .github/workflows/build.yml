name: Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build renderer and Electron main
        run: npm run build

  e2e:
    name: E2E (Electron)
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Ensure the Electron binary + node_modules/electron/path.txt exist.
      # npm ci does not reliably run electron's download postinstall here, and
      # Playwright's electron.launch reads path.txt to find the binary.
      - name: Ensure Electron binary
        run: node node_modules/electron/install.js

      # Electron on Linux CI needs the Chromium system libraries plus a virtual
      # X server. install-deps pulls the shared libs; xvfb-run provides the display.
      - name: Install Electron system dependencies
        run: |
          npx playwright install-deps
          sudo apt-get install -y xvfb

      - name: Run Playwright E2E
        run: xvfb-run -a npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  package-linux:
    name: Package Linux x64
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package Linux artifacts
        run: npx electron-builder --linux AppImage deb --x64 --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aya-linux-x64
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.deb
            release/linux-unpacked/**
